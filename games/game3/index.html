<script>
  (function () {
    function show(msg) {
      try {
        var pre = document.getElementById('__err');
        if (!pre) {
          pre = document.createElement('pre');
          pre.id = '__err';
          pre.style.cssText = [
            'position:fixed','inset:0','margin:0','padding:16px',
            'background:#0b1020','color:#ffb4b4','font:12px/1.5 ui-monospace,Consolas,monospace',
            'white-space:pre-wrap','z-index:999999','overflow:auto'
          ].join(';');
          document.body.appendChild(pre);
        }
        pre.textContent = msg;
      } catch (_) {}
    }
    window.addEventListener('error', function (e) {
      show(String(e.message || (e.error && e.error.stack) || e.error || e));
    });
    window.addEventListener('unhandledrejection', function (e) {
      show('UnhandledRejection: ' + String((e.reason && e.reason.stack) || e.reason));
    });
  })();
</script>
