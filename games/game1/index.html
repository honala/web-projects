<div id="ui-top">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const GW = 14, GH = 9, CS = 1;

// Waypoints [col, row]
const WP = [[-1,4],[2,4],[2,1],[6,1],[6,7],[10,7],[10,3],[GW,3]];

const T_DEFS = {
  laser:  { cost:50,  range:3.2, dmg:14, rate:0.7, aoe:0,   color:0x00ffff, hex:'#00ffff' },
  plasma: { cost:100, range:2.8, dmg:22, rate:1.6, aoe:1.4, color:0xff00cc, hex:'#ff00cc' },
  sniper: { cost:75,  range:6.5, dmg:55, rate:2.4, aoe:0,   color:0xffee00, hex:'#ffee00' },
};

const WAVES = [
  [{t:'n',c:6,i:1.2}],
  [{t:'n',c:8,i:1.0},{t:'f',c:4,i:0.7}],
  [{t:'f',c:8,i:0.6},{t:'n',c:5,i:1.0}],
  [{t:'k',c:2,i:3.0},{t:'n',c:9,i:0.9}],
  [{t:'f',c:10,i:0.45},{t:'k',c:3,i:2.5}],
  [{t:'k',c:4,i:2.0},{t:'f',c:8,i:0.4},{t:'n',c:6,i:0.8}],
];

// ═══════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020212);
scene.fog = new THREE.FogExp2(0x020212, 0.038);

const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 120);
camera.position.set(7, 14, 12);
camera.lookAt(7, 0, 3.5);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
addEventListener('resize', resize);

scene.add(new THREE.AmbientLight(0x111133, 3));
const dLight = new THREE.DirectionalLight(0x2244aa, 1.2);
dLight.position.set(6, 12, 6);
scene.add(dLight);

// ═══════════════════════════════════════════════
//  PATH CELL SET
// ═══════════════════════════════════════════════
const PATH_SET = new Set();
for (let i = 0; i < WP.length-1; i++) {
  const [x0,y0]=WP[i],[x1,y1]=WP[i+1];
  const steps = Math.max(Math.abs(x1-x0),Math.abs(y1-y0));
  for (let s=0;s<=steps;s++){
    const t=steps?s/steps:0;
    const cx=Math.round(x0+(x1-x0)*t), cy=Math.round(y0+(y1-y0)*t);
    if(cx>=0&&cx<GW&&cy>=0&&cy<GH) PATH_SET.add(`${cx},${cy}`);
  }
}

function c2w(cx,cy){ return new THREE.Vector3(cx*CS+CS/2, 0, cy*CS+CS/2); }

// ═══════════════════════════════════════════════
//  SCENE GEOMETRY
// ═══════════════════════════════════════════════
// Ground
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(GW,GH),
  new THREE.MeshBasicMaterial({color:0x03030f})
);
gnd.rotation.x=-Math.PI/2; gnd.position.set(GW/2,-0.01,GH/2);
scene.add(gnd);

// Grid lines
const gridMat = new THREE.LineBasicMaterial({color:0x0a0a22});
for(let x=0;x<=GW;x++){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0,0),new THREE.Vector3(x,0,GH)]);
  scene.add(new THREE.Line(g,gridMat));
}
for(let y=0;y<=GH;y++){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,y),new THREE.Vector3(GW,0,y)]);
  scene.add(new THREE.Line(g,gridMat));
}

// Path tiles
PATH_SET.forEach(k=>{
  const [cx,cy]=k.split(',').map(Number);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(CS*.95,CS*.95),new THREE.MeshBasicMaterial({color:0x080818}));
  m.rotation.x=-Math.PI/2; m.position.copy(c2w(cx,cy)); m.position.y=0;
  scene.add(m);
  const el=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(CS*.95,CS*.95)),
    new THREE.LineBasicMaterial({color:0x0033aa,transparent:true,opacity:0.5}));
  el.rotation.x=-Math.PI/2; el.position.copy(c2w(cx,cy)); el.position.y=0.01;
  scene.add(el);
});

// Path flow line
const flowLine = (() => {
  const pts=WP.map(([x,y])=>new THREE.Vector3(x*CS+CS/2,0.04,y*CS+CS/2));
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x0055ff,transparent:true,opacity:0.5}));
  scene.add(l); return l;
})();

// ═══════════════════════════════════════════════
//  HOVER MESH
// ═══════════════════════════════════════════════
const hitPlane = new THREE.Mesh(new THREE.PlaneGeometry(GW,GH),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
hitPlane.rotation.x=-Math.PI/2; hitPlane.position.set(GW/2,0,GH/2);
scene.add(hitPlane);

const hoverMesh = new THREE.Mesh(new THREE.PlaneGeometry(CS*.9,CS*.9),new THREE.MeshBasicMaterial({transparent:true,opacity:0.2,side:THREE.DoubleSide}));
hoverMesh.rotation.x=-Math.PI/2; hoverMesh.position.y=0.03; hoverMesh.visible=false;
scene.add(hoverMesh);

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let gold=150, lives=20, kills=0, waveNum=0;
let selType='laser', waveActive=false, dead=false;
let towers=[], enemies=[], projectiles=[], sparks=[];
let placedMap={};

function $id(id){ return document.getElementById(id); }
function setUI(){ $id('gold').textContent=gold; $id('lives').textContent=lives; $id('kills').textContent=kills; $id('wave').textContent=`${waveNum}/6`; }

// ═══════════════════════════════════════════════
//  ENEMY
// ═══════════════════════════════════════════════
const E_PROPS = {
  n:{hp:80,  spd:1.5, rew:12, col:0xff0066, sz:0.28},
  f:{hp:45,  spd:2.8, rew:8,  col:0xff6600, sz:0.22},
  k:{hp:220, spd:0.75,rew:30, col:0xaa00ff, sz:0.42},
};

class Enemy {
  constructor(type){
    const p=E_PROPS[type]; this.type=type;
    this.hp=p.hp; this.maxHp=p.hp; this.spd=p.spd; this.rew=p.rew;
    this.wpIdx=0; this.prog=0; this.isDead=false; this.reached=false;

    const geo=new THREE.BoxGeometry(p.sz,p.sz,p.sz);
    const mat=new THREE.MeshBasicMaterial({color:p.col});
    this.mesh=new THREE.Mesh(geo,mat);
    this.mesh.position.y=p.sz/2+0.05;

    // Glow shell
    const gm=new THREE.Mesh(new THREE.BoxGeometry(p.sz*1.6,p.sz*1.6,p.sz*1.6),
      new THREE.MeshBasicMaterial({color:p.col,transparent:true,opacity:0.1,side:THREE.BackSide}));
    this.mesh.add(gm);

    // HP bar bg
    const bbg=new THREE.Mesh(new THREE.PlaneGeometry(0.52,0.07),new THREE.MeshBasicMaterial({color:0x220000}));
    bbg.position.set(0,p.sz+0.18,0); bbg.rotation.x=-Math.PI/5;
    this.mesh.add(bbg);
    // HP bar fill
    this.hpMat=new THREE.MeshBasicMaterial({color:0x00ff55});
    this.hpBar=new THREE.Mesh(new THREE.PlaneGeometry(0.52,0.07),this.hpMat);
    this.hpBar.position.set(0,p.sz+0.18,0.001); this.hpBar.rotation.x=-Math.PI/5;
    this.mesh.add(this.hpBar);

    scene.add(this.mesh);
    this._updatePos();
  }

  _segLen(i){
    const [x0,y0]=WP[i],[x1,y1]=WP[i+1];
    return Math.sqrt((x1-x0)**2+(y1-y0)**2);
  }

  _worldPos(){
    if(this.wpIdx>=WP.length-1){const[x,y]=WP[WP.length-1];return new THREE.Vector3(x*CS+CS/2,0,y*CS+CS/2);}
    const [x0,y0]=WP[this.wpIdx],[x1,y1]=WP[this.wpIdx+1],p=this.prog;
    return new THREE.Vector3((x0+(x1-x0)*p)*CS+CS/2,0,(y0+(y1-y0)*p)*CS+CS/2);
  }

  _updatePos(){
    const wp=this._worldPos();
    this.mesh.position.x=wp.x; this.mesh.position.z=wp.z;
  }

  get pos(){ return this.mesh.position; }

  update(dt){
    if(this.isDead||this.reached)return;
    if(this.wpIdx>=WP.length-1){this.reached=true;this._arrive();return;}
    const sl=this._segLen(this.wpIdx);
    this.prog+=this.spd*dt/sl;
    if(this.prog>=1){this.prog-=1;this.wpIdx++;
      if(this.wpIdx>=WP.length-1){this.reached=true;this._arrive();return;}
    }
    this._updatePos();
    this.mesh.rotation.y+=dt*2.5;
    const r=this.hp/this.maxHp;
    this.hpBar.scale.x=r; this.hpBar.position.x=-(0.52*(1-r))/2;
    this.hpMat.color.setHex(r>0.5?0x00ff55:r>0.25?0xffaa00:0xff2200);
  }

  _arrive(){
    lives=Math.max(0,lives-1); setUI();
    this._remove();
    if(lives<=0&&!dead)endGame(false);
  }

  hit(dmg){
    if(this.isDead)return;
    this.hp-=dmg;
    if(this.hp<=0){
      this.isDead=true;
      gold+=this.rew; kills++; setUI();
      spawnBurst(this.mesh.position.clone(), this.mesh.material.color.getHex());
      this._remove();
    }
  }

  _remove(){ scene.remove(this.mesh); }
}

// ═══════════════════════════════════════════════
//  TOWER
// ═══════════════════════════════════════════════
class Tower {
  constructor(cx,cy,type){
    this.cx=cx; this.cy=cy; this.type=type;
    this.def=T_DEFS[type]; this.cd=0;
    const pos=c2w(cx,cy); const col=this.def.color;

    // Base ring
    const base=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.4,0.14,8),new THREE.MeshBasicMaterial({color:0x0d0d22}));
    this.mesh=new THREE.Group();
    this.mesh.add(base); base.position.y=0.07;

    // Column
    const col2=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.18,0.5,8),new THREE.MeshBasicMaterial({color:0x151528}));
    col2.position.y=0.42; this.mesh.add(col2);

    // Head
    let head;
    if(type==='sniper'){
      head=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.4,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9}));
      head.position.y=0.92;
    } else if(type==='plasma'){
      head=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.85}));
      head.position.y=0.78;
    } else {
      head=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.28,6),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9}));
      head.position.y=0.76;
    }
    this.head=head; this.mesh.add(head);

    // Glow orb
    const glow=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.08,side:THREE.BackSide}));
    glow.position.copy(head.position); this.glowOrb=glow; this.mesh.add(glow);

    // Range ring (hidden)
    const ring=new THREE.Mesh(new THREE.RingGeometry(this.def.range-.04,this.def.range,40),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.07,side:THREE.DoubleSide}));
    ring.rotation.x=-Math.PI/2; ring.position.y=0.02; ring.visible=false;
    this.rangeRing=ring; this.mesh.add(ring);

    this.mesh.position.copy(pos);
    scene.add(this.mesh);
  }

  showRange(v){ this.rangeRing.visible=v; }

  update(dt){
    this.cd=Math.max(0,this.cd-dt);
    if(this.cd>0)return;
    const wp=c2w(this.cx,this.cy);
    let tgt=null,best=Infinity;
    for(const e of enemies){
      if(e.isDead||e.reached)continue;
      const d=new THREE.Vector2(e.pos.x-wp.x,e.pos.z-wp.z).length();
      if(d<=this.def.range&&d<best){tgt=e;best=d;}
    }
    if(!tgt)return;
    this.cd=this.def.rate;

    // Face target
    const dx=tgt.pos.x-wp.x, dz=tgt.pos.z-wp.z;
    this.mesh.rotation.y=Math.atan2(dx,dz);

    if(this.def.aoe>0){
      const tp=tgt.pos.clone();
      for(const e of enemies){
        if(e.isDead||e.reached)continue;
        if(e.pos.distanceTo(tp)<=this.def.aoe)e.hit(this.def.dmg);
      }
      spawnBurst(tp,this.def.color);
    } else {
      tgt.hit(this.def.dmg);
    }

    // Projectile
    const s=wp.clone(); s.y=0.85;
    projectiles.push(new Projectile(s,tgt,this.def.color));

    // Flash
    this.glowOrb.material.opacity=0.4;
    setTimeout(()=>{ if(this.glowOrb)this.glowOrb.material.opacity=0.08; },120);
  }
}

// ═══════════════════════════════════════════════
//  PROJECTILE
// ═══════════════════════════════════════════════
class Projectile {
  constructor(start,target,color){
    this.target=target; this.done=false;
    this.pos=start.clone();
    this.mesh=new THREE.Mesh(new THREE.SphereGeometry(0.065,6,6),new THREE.MeshBasicMaterial({color}));
    this.mesh.position.copy(start); scene.add(this.mesh);
    const tg=new THREE.BufferGeometry().setFromPoints([start.clone(),start.clone()]);
    this.trail=new THREE.Line(tg,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.55}));
    scene.add(this.trail);
  }
  update(dt){
    if(this.done)return;
    if(this.target.isDead||this.target.reached){this._rm();return;}
    const tp=this.target.pos.clone(); tp.y=0.5;
    const dir=tp.clone().sub(this.pos).normalize();
    const prev=this.pos.clone();
    this.pos.addScaledVector(dir,11*dt);
    this.mesh.position.copy(this.pos);
    this.trail.geometry.setFromPoints([prev,this.pos.clone()]);
    if(this.pos.distanceTo(this.target.pos)<0.35)this._rm();
  }
  _rm(){ this.done=true; scene.remove(this.mesh); scene.remove(this.trail); }
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function spawnBurst(pos, color){
  for(let i=0;i<14;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    m.position.copy(pos); scene.add(m);
    const v=new THREE.Vector3((Math.random()-.5)*5,Math.random()*4+1,(Math.random()-.5)*5);
    sparks.push({m,v,life:0.4+Math.random()*0.35,ml:0.75});
  }
}

function tickSparks(dt){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i]; s.life-=dt;
    s.m.position.addScaledVector(s.v,dt); s.v.y-=7*dt;
    s.m.material.opacity=s.life/s.ml;
    if(s.life<=0){scene.remove(s.m);sparks.splice(i,1);}
  }
}

// ═══════════════════════════════════════════════
//  WAVE SYSTEM
// ═══════════════════════════════════════════════
let spawnQ=[], spawnT=0;

function sendWave(){
  if(waveActive||dead||waveNum>=6)return;
  waveNum++; setUI(); $id('wave-btn').disabled=true;
  waveActive=true; spawnQ=[]; spawnT=0;
  const cfg=WAVES[waveNum-1];
  let delay=0;
  for(const g of cfg){
    for(let i=0;i<g.c;i++){spawnQ.push({t:g.t,delay});delay+=g.i;}
  }
  spawnQ.sort((a,b)=>a.delay-b.delay);
}

function tickWave(dt){
  if(!waveActive)return;
  spawnT+=dt;
  while(spawnQ.length&&spawnQ[0].delay<=spawnT){
    enemies.push(new Enemy(spawnQ.shift().t));
  }
  if(!spawnQ.length&&enemies.every(e=>e.isDead||e.reached)){
    waveActive=false;
    if(waveNum>=6){endGame(true);return;}
    gold+=20+waveNum*8; setUI();
    $id('wave-btn').disabled=false;
  }
}

// ═══════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════
function endGame(win){
  dead=true;
  const ov=$id('overlay');
  const title=$id('ov-title'), sub=$id('ov-sub');
  title.textContent=win?'GRID SECURED':'SYSTEM BREACH';
  title.style.color=win?'#00ffcc':'#ff2244';
  title.style.textShadow=`0 0 30px ${win?'#00ffcc':'#ff2244'}`;
  sub.textContent=win?`所有入侵者已清除 · 击杀 ${kills}`:`防线崩溃 · 第 ${waveNum} 波`;
  sub.style.color=win?'#00ffcc':'#ff2244';
  ov.style.color=win?'#00ffcc':'#ff2244';
  ov.style.display='flex';
}

$id('ov-btn').addEventListener('click',()=>location.reload());

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
const rc=new THREE.Raycaster(), mouse=new THREE.Vector2();
let hoverCell=null;

function getCell(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1; mouse.y=-(ev.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const hits=rc.intersectObject(hitPlane);
  if(!hits.length)return null;
  const p=hits[0].point;
  const cx=Math.floor(p.x/CS), cy=Math.floor(p.z/CS);
  if(cx<0||cx>=GW||cy<0||cy>=GH)return null;
  return {cx,cy,key:`${cx},${cy}`};
}

addEventListener('mousemove',ev=>{
  if(dead)return;
  const c=getCell(ev); hoverCell=c;
  if(!c||selType==='none'){hoverMesh.visible=false;towers.forEach(t=>t.showRange(false));return;}
  const onPath=PATH_SET.has(c.key), occ=!!placedMap[c.key];
  hoverMesh.position.set(c.cx*CS+CS/2,0.03,c.cy*CS+CS/2);
  hoverMesh.visible=true;
  hoverMesh.material.color.setHex(onPath||occ?0xff2244:0x00ffff);
  hoverMesh.material.opacity=onPath||occ?0.05:0.2;
  towers.forEach(t=>t.showRange(false));
  if(placedMap[c.key])placedMap[c.key].showRange(true);
});

addEventListener('click',ev=>{
  if(dead||selType==='none')return;
  if(ev.target!==canvas)return;
  const c=getCell(ev); if(!c)return;
  if(PATH_SET.has(c.key)||placedMap[c.key])return;
  const def=T_DEFS[selType];
  if(gold<def.cost){
    const el=$id('gold'); el.style.color='#ff2244'; el.style.textShadow='0 0 12px #ff2244';
    setTimeout(()=>{el.style.color='';el.style.textShadow='';},500); return;
  }
  gold-=def.cost; setUI();
  const t=new Tower(c.cx,c.cy,selType);
  towers.push(t); placedMap[c.key]=t;
});

document.querySelectorAll('.tbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); selType=b.dataset.t;
  });
});
$id('wave-btn').addEventListener('click',sendWave);

// ═══════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════
// Animated path glow
let flowT=0;

let last=0;
(function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000,0.05); last=ts;

  if(!dead){
    tickWave(dt);
    for(let i=enemies.length-1;i>=0;i--){
      enemies[i].update(dt);
      if(enemies[i].isDead||enemies[i].reached)enemies.splice(i,1);
    }
    towers.forEach(t=>t.update(dt));
    for(let i=projectiles.length-1;i>=0;i--){
      projectiles[i].update(dt);
      if(projectiles[i].done)projectiles.splice(i,1);
    }
    tickSparks(dt);

    // Pulsing path
    flowT+=dt; 
    flowLine.material.opacity=0.35+Math.sin(flowT*2.5)*0.2;

    // Gentle camera drift
    camera.position.x=7+Math.sin(ts*0.0002)*0.4;
    camera.lookAt(7,0,3.5);
  }

  renderer.render(scene,camera);
})(0);
</script>
