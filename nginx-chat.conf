map $host $site_root {
    default              /var/www/html/nav;
    www.honala.xyz       /var/www/html/www;
    chat.honala.xyz      /var/www/html/chat;
    download.honala.xyz  /var/www/html/download;
    photos.honala.xyz    /var/www/html/photos;
    flix.honala.xyz      /var/www/html/flix;
    games.honala.xyz     /var/www/html/games;
    lab.honala.xyz       /var/www/html/lab;
    cloud.honala.xyz     /var/www/html/cloud;
    3d.honala.xyz        /var/www/html/3D;
}

server {
    listen 80;
    listen 8080;
    server_name _;

    root $site_root;
    index index.html;

    location /api/tags {
        proxy_pass http://127.0.0.1:11434/api/tags;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    location /api/chat {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:5055/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 20m;
    }

    location /api/image-gen {
        proxy_pass http://127.0.0.1:5055/image-gen;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/video-gen {
        proxy_pass http://127.0.0.1:5055/video-gen;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:11434;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/chat-upload {
        add_header Access-Control-Allow-Origin "*" always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://127.0.0.1:5055/chat-upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 35m;
    }

    location /api/sessions {
        add_header Access-Control-Allow-Origin "*" always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://127.0.0.1:5055/sessions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/messages {
        proxy_pass http://127.0.0.1:5055/messages;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/providers {
        proxy_pass http://127.0.0.1:5055/providers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/external/ {
        proxy_pass http://127.0.0.1:5055/external/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /papi/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:5055/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 35m;
    }

    location /media/ {
        autoindex on;
        alias $site_root/files/;
    }

    location /videos/ {
        autoindex on;
        alias $site_root/files/;
    }

    location /videos-legacy/ {
        autoindex on;
        alias $site_root/files/;
    }

    location /files/ {
        alias $site_root/files/;
        autoindex on;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }
}