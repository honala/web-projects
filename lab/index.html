<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab · honala</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810;
      --surface: #0b0f1a;
      --border: rgba(0, 229, 255, 0.12);
      --border2: rgba(255, 255, 255, 0.06);
      --cyan: #00e5ff;
      --text: #e6f1ff;
      --sub: #5a7080;
      --sub2: #8aa0b5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 72px 28px 96px;
    }
    .eyebrow {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0.75;
      margin-bottom: 16px;
    }
    h1 {
      font-family: Orbitron, sans-serif;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .lead {
      color: var(--sub2);
      font-size: 12px;
      max-width: 420px;
      margin-bottom: 48px;
      line-height: 1.85;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 24px 22px;
      background: var(--surface);
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    a.card::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--cyan);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    a.card:hover {
      border-color: var(--border);
      background: rgba(0, 229, 255, 0.04);
    }
    a.card:hover::before { transform: scaleX(1); }
    .card-label {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 10px;
    }
    .card-title {
      font-family: Orbitron, sans-serif;
      font-size: 14px;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .card-path {
      font-size: 10px;
      color: var(--cyan);
      opacity: 0.55;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.75;
    }
    footer {
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid var(--border2);
      font-size: 10px;
      color: var(--sub);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">// LAB · honala.xyz</p>
    <h1>实验目录</h1>
    <p class="lead">本地节点面板与前端实验页分开展示；从此页进入各子页。</p>

    <div class="grid">
      <a class="card" href="honala_dashboard.html">
        <div class="card-label">Node</div>
        <div class="card-title">HONALA 节点</div>
        <div class="card-path">honala_dashboard.html</div>
        <div class="card-desc">Ollama 状态、模型列表与系统说明。</div>
      </a>
      <a class="card" href="ios-liquid-glass.html">
        <div class="card-label">UI</div>
        <div class="card-title">iOS Liquid Glass</div>
        <div class="card-path">ios-liquid-glass.html</div>
        <div class="card-desc">液态玻璃、焦散与超椭圆 squircle 演示。</div>
      </a>
      <a class="card" href="glass-effects.html">
        <div class="card-label">UI</div>
        <div class="card-title">Glass Morphism</div>
        <div class="card-path">glass-effects.html</div>
        <div class="card-desc">玻璃拟态与动态光球背景。</div>
      </a>
      <a class="card" href="honala-homepage.html">
        <div class="card-label">UI</div>
        <div class="card-title">honala 首页稿</div>
        <div class="card-path">honala-homepage.html</div>
        <div class="card-desc">个人节点风格落地页实验。</div>
      </a>
    </div>

    <footer>HONALA LAB · UTF-8</footer>
  </div>
</body>
</html>
