<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋友们的摄影作品</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1a1a18;
    --muted: #8a8680;
    --accent: #c9472f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 64px 32px 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(0,0,0,0.012) 20px,
      rgba(0,0,0,0.012) 21px
    );
    pointer-events: none;
  }
  .header-label {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }
  h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 12px;
  }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .header-actions {
    position: absolute;
    top: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    z-index: 2;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.92);
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    backdrop-filter: blur(6px);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 26px rgba(0,0,0,0.06); border-color: #d0ccc4; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.ghost { background: rgba(255,255,255,0.8); }
  .btn:disabled { opacity: 0.6; cursor: default; transform: none; box-shadow: none; }

  .spin { display: inline-block; animation: spin 0.9s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
    box-shadow: 0 14px 40px rgba(0,0,0,0.10);
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 130;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-2px); }

  /* ── Gallery grid ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .gallery {
    columns: 3 280px;
    column-gap: 20px;
  }

  .card {
    break-inside: avoid;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.1);
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    background: #f0ede8;
  }
  .card img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
    object-fit: cover;
  }
  .card:hover img {
    transform: scale(1.03);
  }

  /* Placeholder when no real image */
  .card-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0ede8 0%, #e8e4dc 100%);
    font-size: 48px;
  }

  .card-body {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .card-name {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }
  .card-caption {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 8, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: lbFadeIn 0.2s ease;
  }
  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lightbox.open { display: flex; flex-direction: column; gap: 16px; }

  .lightbox img {
    max-width: 90vw;
    max-height: 72vh;
    object-fit: contain;
    border-radius: 3px;
    opacity: 0;
    --tx: 0px;
    --ty: 0px;
    --s: 1;
    transform: translate3d(var(--tx), var(--ty), 0) scale(var(--s));
    transition: opacity 0.22s ease, transform 0.22s ease;
    touch-action: none;
    will-change: transform, opacity;
  }
  .lightbox img.lb-visible {
    opacity: 1;
    --ty: 0px;
    --s: 1;
  }

  .lb-caption {
    color: #fff;
    font-size: 14px;
    text-align: center;
    opacity: 0.85;
    max-width: 520px;
    line-height: 1.6;
  }
  .lb-name {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 4px;
  }
  .lb-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.16);
    color: rgba(255,255,255,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .lb-prev { left: 18px; }
  .lb-next { right: 18px; }

  .lb-story {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.75;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── Upload modal ── */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 8, 0.68);
    z-index: 120;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }
  .modal.open { display: flex; }
  .modal-panel {
    width: min(760px, 94vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.18);
  }
  .modal-head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 18px;
  }
  .modal-close {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
  }
  .modal-close:hover { color: var(--text); border-color: #d0ccc4; }
  .modal-body { padding: 16px 18px 18px; }
  .form-row {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
  }
  .token-wrap { position: relative; }
  .eye-btn {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .eye-btn:hover { border-color: #d0ccc4; color: var(--text); box-shadow: 0 10px 22px rgba(0,0,0,0.05); }
  .form-row label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .input, textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
  }
  textarea { min-height: 120px; resize: vertical; white-space: pre-wrap; }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .status {
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    display: none;
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--muted);
  }
  .status.ok { display: block; border-color: rgba(46,166,90,0.35); }
  .status.err { display: block; border-color: rgba(201,71,47,0.35); }
  .tiny-note { font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 10px; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h2 { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 13px; line-height: 1.7; }

  /* ── Column toggle (mobile only) ── */
  .col-toggle { display: none; }

  /* ── Lightbox counter ── */
  .lb-counter {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    letter-spacing: 0.18em;
    pointer-events: none;
    z-index: 110;
  }

  /* ── Desktop nav arrows — bigger hit area ── */
  .lb-nav {
    font-size: 26px;
    width: 52px;
    height: 52px;
    opacity: 0.7;
    transition: opacity 0.15s, background 0.15s;
  }
  .lb-nav:hover { opacity: 1; }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  /* ── Swipe transition ── */
  .lb-img-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    max-width: 90vw;
    max-height: 72vh;
    position: relative;
  }

  @media (max-width: 600px) {
    header { padding: 34px 16px 28px; }
    main { padding: 32px 16px 60px; }
    .gallery { columns: 2 160px; column-gap: 12px; }
    .gallery.cols-1 { columns: 1 !important; column-gap: 0; }
    .card { margin-bottom: 12px; }

    .col-toggle { display: inline-flex; }

    .header-actions {
      position: static;
      margin: 14px auto 0;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn { height: 38px; padding: 0 14px; font-size: 12.5px; }

    .toast {
      bottom: 16px;
      width: calc(100vw - 28px);
      max-width: 520px;
      text-align: center;
      border-radius: 14px;
    }

    .modal-panel { width: min(760px, 96vw); }
    .form-row { grid-template-columns: 1fr; gap: 8px; }
    .form-row label { margin-left: 2px; }
    .modal-actions { gap: 8px; }
    .modal-actions .btn { flex: 1; }
    .eye-btn { right: 6px; }
    .token-wrap .input { padding-right: 56px; }
    .lightbox img { max-height: 70vh; }
    .lb-nav {
      width: 44px; height: 44px;
      font-size: 22px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      opacity: 0.85;
    }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
  }
</style>
</head>
<body>

<header>
  <span class="header-label">Private Collection</span>
  <h1>朋友们的摄影作品</h1>
  <p class="header-sub">一个小小画廊 · 作品来自朋友们 · 点击可放大查看</p>
  <div class="header-actions">
    <button class="btn ghost col-toggle" id="btn-cols" type="button" title="切换列数">⊞</button>
    <button class="btn ghost" id="btn-refresh" type="button"><span id="refresh-ico">⟳</span> 刷新</button>
    <button class="btn primary" id="btn-upload" type="button">上传作品</button>
    <a class="btn ghost" href="/admin.html" style="text-decoration:none;">管理</a>
  </div>
</header>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <div class="lb-counter" id="lb-counter"></div>
  <div class="lb-nav lb-prev" id="lb-prev" aria-label="上一张">‹</div>
  <div class="lb-nav lb-next" id="lb-next" aria-label="下一张">›</div>
  <div class="lb-name" id="lb-name"></div>
  <img id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<div class="modal" id="upload-modal" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-label="上传作品">
    <div class="modal-head">
      <div class="modal-title">上传摄影作品</div>
      <button class="modal-close" id="upload-close" type="button" aria-label="关闭">×</button>
    </div>
    <div class="modal-body">
      <form id="upload-form">
        <div class="form-row">
          <label>图片文件</label>
          <input class="input" name="file" type="file" accept="image/*" required>
        </div>
        <div class="form-row">
          <label>作者 / ID</label>
          <input class="input" name="author" type="text" placeholder="比如：朋友A / @alice">
        </div>
        <div class="form-row">
          <label>标题</label>
          <input class="input" name="title" type="text" placeholder="比如：街头光影">
        </div>
        <div class="form-row">
          <label>一句话说明</label>
          <input class="input" name="caption" type="text" placeholder="比如：2026 · Shanghai">
        </div>
        <div class="form-row">
          <label>长文案（可多行）</label>
          <textarea class="input" name="story" placeholder="写一段更长的文案…（支持换行）"></textarea>
        </div>
        <div class="form-row">
          <label>上传口令</label>
          <div class="token-wrap">
            <input class="input" id="token-input" name="token" type="password" placeholder="输入口令" required>
            <button class="eye-btn" id="token-eye" type="button" aria-label="显示/隐藏口令">👁</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn ghost" id="upload-cancel" type="button">取消</button>
          <button class="btn primary" id="upload-submit" type="submit">上传</button>
        </div>
      </form>

      <div id="upload-status" class="status"></div>
      <div class="tiny-note">上传后会自动生成缩略图并写入作品信息；没有口令的人无法写入硬盘。</div>
    </div>
  </div>
</div>

<footer>honala.xyz · 请尊重作者 · 未经允许请勿转载</footer>
<div class="toast" id="toast" aria-live="polite"></div>

<script>
const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbPrev = document.getElementById('lb-prev');
const lbNext = document.getElementById('lb-next');
const btnUpload = document.getElementById('btn-upload');
const btnRefresh = document.getElementById('btn-refresh');
const btnCols = document.getElementById('btn-cols');
const refreshIco = document.getElementById('refresh-ico');
const toastEl = document.getElementById('toast');
const uploadModal = document.getElementById('upload-modal');
const uploadClose = document.getElementById('upload-close');
const uploadCancel = document.getElementById('upload-cancel');
const uploadForm = document.getElementById('upload-form');
const uploadStatus = document.getElementById('upload-status');
const uploadSubmit = document.getElementById('upload-submit');
const tokenInput = document.getElementById('token-input');
const tokenEye = document.getElementById('token-eye');
const lbCounter = document.getElementById('lb-counter');

// Column toggle (mobile)
let _cols = 2;
try { _cols = parseInt(localStorage.getItem('honala.photos.cols')) || 2; } catch {}
function applyColLayout() {
  gallery.classList.toggle('cols-1', _cols === 1);
  gallery.classList.toggle('cols-2', _cols === 2);
  if (btnCols) btnCols.textContent = _cols === 1 ? '⊟' : '⊞';
}
applyColLayout();
if (btnCols) btnCols.addEventListener('click', () => {
  _cols = _cols === 1 ? 2 : 1;
  try { localStorage.setItem('honala.photos.cols', String(_cols)); } catch {}
  applyColLayout();
  toast(_cols === 1 ? '单列模式' : '双列模式');
});

let _items = [];
let _meta = null;
let _current = -1;
let _touch = null;
let _imgZoom = { s: 1, tx: 0, ty: 0 };
let _ptr = new Map(); // pointerId -> {x,y}
let _pinch = null;    // {dist, cx, cy, s0, tx0, ty0}

function basename(name) {
  const s = String(name || '');
  const i = s.lastIndexOf('/');
  return i >= 0 ? s.slice(i + 1) : s;
}

function stripExt(name) {
  const b = basename(name);
  const i = b.lastIndexOf('.');
  return i > 0 ? b.slice(0, i) : b;
}

function isImage(name) {
  return /\.(png|jpe?g|webp|gif|bmp|avif)$/i.test(name || '');
}

function safeText(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function loadMeta() {
  try {
    const r = await fetch('./meta.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return { version: 1, photos: {} };
    const j = await r.json();
    return j && typeof j === 'object' ? j : { version: 1, photos: {} };
  } catch {
    return { version: 1, photos: {} };
  }
}

async function loadFilesFromAutoindex() {
  const r = await fetch('./files/?ts=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('无法读取 /files/ 列表（Nginx autoindex JSON）');
  const j = await r.json();
  if (!Array.isArray(j)) throw new Error('/files/ 返回格式异常');
  return j
    .filter(x => x && x.type === 'file' && isImage(x.name))
    .map(x => ({
      file: basename(x.name),
      mtime: x.mtime || '',
      size: x.size || 0
    }))
    .sort((a, b) => String(b.mtime).localeCompare(String(a.mtime)));
}

/** 仅展示未在 meta 中标记 hidden 的作品（管理员在后台隐藏） */
function filterPublicVisible(items, meta) {
  const photos = meta && meta.photos && typeof meta.photos === 'object' ? meta.photos : {};
  return items.filter((it) => {
    const m = photos[it.file];
    if (m && m.hidden === true) return false;
    return true;
  });
}

function renderGallery(items, meta) {
  gallery.innerHTML = '';
  if (!items.length) {
    gallery.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📷</div>
        <h2>还没有作品</h2>
        <p>把图片放进 <b>photos/files/</b> 目录<br>页面会自动出现（支持 jpg/png/webp 等）</p>
      </div>`;
    return;
  }

  items.forEach((it, idx) => {
    const key = it.file;
    const m = (meta && meta.photos && meta.photos[key]) ? meta.photos[key] : null;
    const title = (m && m.title) ? m.title : stripExt(it.file);
    const author = (m && m.author) ? m.author : 'Photography';
    const caption = (m && m.caption) ? m.caption : '点击查看大图';
    const story = (m && m.story) ? m.story : '';
    const src = './files/' + encodeURIComponent(it.file);
    const thumb = './files/thumbs/' + encodeURIComponent(it.file);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${thumb}" data-full="${src}" alt="${safeText(title)}" loading="lazy"
          onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src=this.dataset.full;return;}this.parentNode.innerHTML='<div class=\\'card-placeholder\\'>📷</div>'">
      </div>
      <div class="card-body">
        <div class="card-name">${safeText(author)}</div>
        <div class="card-caption">${safeText(title)} · ${safeText(caption)}</div>
      </div>`;
    card.addEventListener('click', () => openLightbox(idx));
    gallery.appendChild(card);
  });
}

function showLightboxAt(idx) {
  if (!_items.length) return;
  _current = (idx + _items.length) % _items.length;

  const it = _items[_current];
  const key = it.file;
  const m = (_meta && _meta.photos && _meta.photos[key]) ? _meta.photos[key] : null;
  const title = (m && m.title) ? m.title : stripExt(it.file);
  const author = (m && m.author) ? m.author : 'Photography';
  const caption = (m && m.caption) ? m.caption : '点击查看大图';
  const story = (m && m.story) ? m.story : '';
  const src = './files/' + encodeURIComponent(it.file);

  const img = document.getElementById('lb-img');
  resetZoom();
  img.classList.remove('lb-visible');
  // small delay so CSS transition can re-apply
  setTimeout(() => img.classList.add('lb-visible'), 10);
  img.src = src;
  img.alt = title;
  document.getElementById('lb-name').textContent = author;
  if (lbCounter) lbCounter.textContent = `${_current + 1} / ${_items.length}`;
  const cap = document.getElementById('lb-caption');
  cap.innerHTML = `${safeText(title)} · ${safeText(caption)}${story ? `<div class="lb-story">${safeText(story)}</div>` : ''}`;
}

function openLightbox(idx) {
  showLightboxAt(idx);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function nextPhoto() { showLightboxAt(_current + 1); }
function prevPhoto() { showLightboxAt(_current - 1); }

function applyZoom() {
  const img = document.getElementById('lb-img');
  if (!img) return;
  img.style.setProperty('--s', String(_imgZoom.s));
  img.style.setProperty('--tx', `${_imgZoom.tx}px`);
  img.style.setProperty('--ty', `${_imgZoom.ty}px`);
}

function resetZoom() {
  _imgZoom = { s: 1, tx: 0, ty: 0 };
  applyZoom();
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.hypot(dx, dy);
}

function midpoint(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function zoomTo(newS, centerX, centerY) {
  const img = document.getElementById('lb-img');
  if (!img) return;
  const rect = img.getBoundingClientRect();
  const cx = centerX - (rect.left + rect.width / 2);
  const cy = centerY - (rect.top + rect.height / 2);

  // Adjust translation so the zoom centers around the gesture point
  const ratio = newS / _imgZoom.s;
  _imgZoom.tx = _imgZoom.tx + cx - cx * ratio;
  _imgZoom.ty = _imgZoom.ty + cy - cy * ratio;
  _imgZoom.s = newS;
  applyZoom();
}

let _swipeAnimating = false;

function animateSwipe(dir, doNav) {
  const img = document.getElementById('lb-img');
  if (!img || _swipeAnimating) return;
  _swipeAnimating = true;

  const outX = dir === 'next' ? '-110vw' : '110vw';
  const inX  = dir === 'next' ?  '110vw' : '-110vw';

  // Slide current image out
  img.style.transition = 'transform 0.22s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease';
  img.style.setProperty('--tx', outX);
  img.style.setProperty('--ty', '0px');
  img.style.setProperty('--s', '1');
  img.style.opacity = '0';

  setTimeout(() => {
    // Execute nav (updates src, resets zoom)
    doNav();
    // Position new image off-screen on the opposite side, invisible
    img.style.transition = 'none';
    img.style.setProperty('--tx', inX);
    img.style.opacity = '0';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      // Slide new image in
      img.style.transition = 'transform 0.24s cubic-bezier(0.2,0,0.1,1), opacity 0.2s ease';
      img.style.setProperty('--tx', '0px');
      img.style.opacity = '1';
      img.classList.add('lb-visible');
      setTimeout(() => { _swipeAnimating = false; }, 260);
    }));
  }, 200);
}

lbNext.addEventListener('click', (e) => { e.stopPropagation(); animateSwipe('next', nextPhoto); });
lbPrev.addEventListener('click', (e) => { e.stopPropagation(); animateSwipe('prev', prevPhoto); });

lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') { animateSwipe('next', nextPhoto); }
  if (e.key === 'ArrowLeft') { animateSwipe('prev', prevPhoto); }
});

// Touch swipe (mobile)
lightbox.addEventListener('touchstart', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.touches && e.touches.length > 1) return;
  const t = e.touches && e.touches[0];
  if (!t) return;
  _touch = { x: t.clientX, y: t.clientY, time: Date.now() };
}, { passive: true });
lightbox.addEventListener('touchmove', (e) => {
  if (!_touch || !lightbox.classList.contains('open')) return;
  if (e.touches && e.touches.length > 1) return;
  const t = e.touches && e.touches[0];
  if (!t) return;
  const dx = t.clientX - _touch.x;
  const dy = t.clientY - _touch.y;
  if (_imgZoom.s > 1.02) return;
  if (Math.abs(dy) > Math.abs(dx) * 1.5) return; // more vertical than horizontal → don't hijack
  const img = document.getElementById('lb-img');
  if (!img) return;
  img.style.transition = 'none';
  // slight resistance effect at edges (first/last photo)
  const resistance = 0.35;
  const atEdge = (_current === 0 && dx > 0) || (_current === _items.length - 1 && dx < 0);
  img.style.setProperty('--tx', `${atEdge ? dx * resistance : dx}px`);
}, { passive: true });
lightbox.addEventListener('touchend', (e) => {
  if (!_touch || !lightbox.classList.contains('open')) return;
  const t = e.changedTouches && e.changedTouches[0];
  if (!t) return;
  const dx = t.clientX - _touch.x;
  const dy = t.clientY - _touch.y;
  const dt = Date.now() - _touch.time;
  _touch = null;
  const img = document.getElementById('lb-img');
  if (img) img.style.transition = '';
  // Snap back if swipe not strong enough
  if (dt > 800 || Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.2) {
    if (img) {
      img.style.transition = 'transform 0.2s ease';
      img.style.setProperty('--tx', '0px');
    }
    return;
  }
  if (dx < 0) animateSwipe('next', nextPhoto);
  else animateSwipe('prev', prevPhoto);
}, { passive: true });

// Pinch-to-zoom + pan (Pointer Events)
const lbImg = document.getElementById('lb-img');
let _lastTap = 0;
lbImg.addEventListener('pointerdown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  lbImg.setPointerCapture(e.pointerId);
  _ptr.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (_ptr.size === 2) {
    const pts = [..._ptr.values()];
    const m = midpoint(pts[0], pts[1]);
    _pinch = { dist: dist(pts[0], pts[1]), cx: m.x, cy: m.y, s0: _imgZoom.s, tx0: _imgZoom.tx, ty0: _imgZoom.ty };
  }
});
lbImg.addEventListener('pointermove', (e) => {
  if (!_ptr.has(e.pointerId)) return;
  _ptr.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (_ptr.size === 2) {
    const pts = [..._ptr.values()];
    const m = midpoint(pts[0], pts[1]);
    const d = dist(pts[0], pts[1]);
    if (!_pinch) _pinch = { dist: d, cx: m.x, cy: m.y, s0: _imgZoom.s, tx0: _imgZoom.tx, ty0: _imgZoom.ty };
    const factor = d / (_pinch.dist || d);
    const ns = clamp(_pinch.s0 * factor, 1, 4);
    _imgZoom.tx = _pinch.tx0;
    _imgZoom.ty = _pinch.ty0;
    _imgZoom.s = _pinch.s0;
    zoomTo(ns, m.x, m.y);
  } else if (_ptr.size === 1 && _imgZoom.s > 1.02) {
    // pan when zoomed
    const p = [..._ptr.values()][0];
    // Use movementX/Y for smoother feel
    _imgZoom.tx += (e.movementX || 0);
    _imgZoom.ty += (e.movementY || 0);
    applyZoom();
  }
});
lbImg.addEventListener('pointerup', (e) => {
  _ptr.delete(e.pointerId);
  if (_ptr.size < 2) _pinch = null;
});
lbImg.addEventListener('pointercancel', (e) => {
  _ptr.delete(e.pointerId);
  if (_ptr.size < 2) _pinch = null;
});

// Double-tap to zoom (mobile-friendly)
lbImg.addEventListener('pointerup', (e) => {
  const now = Date.now();
  if (now - _lastTap < 280) {
    // toggle 1x <-> 2.5x
    const target = (_imgZoom.s > 1.05) ? 1 : 2.5;
    resetZoom();
    if (target > 1) zoomTo(target, e.clientX, e.clientY);
  }
  _lastTap = now;
});

function openUpload() {
  uploadStatus.className = 'status';
  uploadStatus.style.display = 'none';
  uploadModal.classList.add('open');
  uploadModal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  // Load token from localStorage if present (doesn't expose it to server; just convenience)
  try {
    const saved = localStorage.getItem('honala.photos.token');
    if (saved && tokenInput && !tokenInput.value) tokenInput.value = saved;
  } catch {}
}

function closeUpload() {
  uploadModal.classList.remove('open');
  uploadModal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

let _toastTimer = null;
function toast(msg) {
  if (!toastEl) return;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

async function refreshGallery() {
  if (btnRefresh.disabled) return;
  btnRefresh.disabled = true;
  if (refreshIco) refreshIco.classList.add('spin');
  const before = _items.length;
  try {
    const [meta, items] = await Promise.all([loadMeta(), loadFilesFromAutoindex()]);
    _meta = meta;
    const visible = filterPublicVisible(items, meta);
    _items = visible;
    renderGallery(visible, meta);
    const hiddenN = items.length - visible.length;
    const delta = visible.length - before;
    const t = new Date();
    const hh = String(t.getHours()).padStart(2, '0');
    const mm = String(t.getMinutes()).padStart(2, '0');
    toast(`已刷新 · ${visible.length} 张展示${hiddenN > 0 ? `（${hiddenN} 张已隐藏）` : ''}${delta > 0 ? ` · +${delta}` : ''} · ${hh}:${mm}`);
  } catch (e) {
    gallery.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h2>加载失败</h2>
        <p>${safeText(e && e.message ? e.message : 'Unknown error')}</p>
      </div>`;
    toast('刷新失败：请检查上传服务/Nginx');
  } finally {
    btnRefresh.disabled = false;
    if (refreshIco) refreshIco.classList.remove('spin');
  }
}

btnUpload.addEventListener('click', openUpload);
btnRefresh.addEventListener('click', refreshGallery);
uploadClose.addEventListener('click', closeUpload);
uploadCancel.addEventListener('click', closeUpload);
uploadModal.addEventListener('click', (e) => { if (e.target === uploadModal) closeUpload(); });
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (uploadModal.classList.contains('open')) closeUpload();
});

uploadForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  uploadStatus.className = 'status';
  uploadStatus.style.display = 'block';
  uploadStatus.textContent = '正在上传…请稍等';
  uploadSubmit.disabled = true;

  const fd = new FormData(uploadForm);
  try {
    // Remember token locally for convenience
    try {
      const t = (tokenInput && tokenInput.value) ? tokenInput.value : '';
      if (t) localStorage.setItem('honala.photos.token', t);
    } catch {}

    const r = await fetch('/papi/upload', { method: 'POST', body: fd });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j && j.error ? j.error : ('HTTP ' + r.status));
    uploadStatus.className = 'status ok';
    uploadStatus.textContent = `上传成功：${j.file || ''}（缩略图已生成）`;
    uploadForm.reset();
    // keep token from localStorage
    try {
      const saved = localStorage.getItem('honala.photos.token');
      if (saved && tokenInput) tokenInput.value = saved;
    } catch {}
    await refreshGallery();
  } catch (err) {
    uploadStatus.className = 'status err';
    uploadStatus.textContent = '上传失败：' + (err && err.message ? err.message : String(err));
  } finally {
    uploadSubmit.disabled = false;
  }
});

tokenEye.addEventListener('click', () => {
  if (!tokenInput) return;
  tokenInput.type = tokenInput.type === 'password' ? 'text' : 'password';
});

refreshGallery();
</script>
